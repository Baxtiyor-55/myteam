<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact</title>
    <link rel="stylesheet" href="./css/contact.css">
</head>
<body>
    <header class="myteam-contact-header">
        <div class="container">
            <nav class="site-contact-navbar">
            <div class="nav-contact-link">
                <div class="important-contact-link">
                <a href="#"><img width="160" src="./images/myteam icon.svg" alt="myteam-icon"></a>
                    <a href="#">home</a>
                    <a href="#">about</a>
                </div>
                <div>
                    <button class="navbar-contact-btn">contact us</button>
                </div>
            </div>
        </nav>
        </div>
    </header>


    <main class="site-main-contact">
        <section class="site-contact-section">
            <div class="container">
                <div class="contact-big">
                    <div class="contact">
                        <h2 class="contact-title">
                            Contact
                        </h2>
                        <h3 class="contact-title-h3">
                            Ask us about
                        </h3>
                        <div class="tuh">
                            <div class="img-info">
                                <div class="img-info-flex">
                                <img src="./contact-images/man.svg" alt="">
                                <p class="img-info-title">The quality of our talent network</p>
                                </div>
                                <div class="img-info-flex">
                                <img src="./contact-images/setting.svg" alt="">
                                <p class="img-info-title">Usage & implementation of our software</p>
                                </div>
                                <div class="img-info-flex">
                                <img src="./contact-images/strategy.svg" alt="">
                                <p class="img-info-title">How we help drive innovation</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <form class="contact-input">
                        <input type="text" placeholder="Name">
                        <input type="email" placeholder="Email Address">
                        <input type="text" placeholder="Company Name">
                        <input type="text" placeholder="Title">
                        <textarea placeholder="Message"></textarea>
                        <button type="submit" class="contact-btn">submit</button>
                    </form>
                </div>
            </div>
        </section>





        <footer class="site-footer">
            <div class="container">
                <div class="footer-big">
                    <div class="footer-logo">
                        <img src="./images/myteam icon.svg" alt="myteam icon">
                        <div class="ahref-footer">
                        <a href="#">home</a>
                        <a href="#">about</a>
                        </div>
                    </div>
                    <div class="footer-info-div">
                        <p class="footer-info">
                            987  Hillcrest Lane Irvine, CACalifornia 92714 Call Us : 949-833-7432
                        </p>
                    </div>
                    <div class="copyright">
                        <div class="footer-iconn">
                            <img width="" src="./photo/facebook.svg" alt="">
                            <img width="" src="./photo/dog.svg" alt="">
                            <img width="" src="./photo/twitter.svg" alt="">
                            <p class="footer-icon-info">Copyright 2020. All Rights Reserved</p>
                        </div>
                    </div>
                </div>
            </div>
        </footer>
    </main>
